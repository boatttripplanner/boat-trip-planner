    <style>
      body {
        -webkit-tap-highlight-color: transparent; /* Disable tap highlight on iOS */
        /* Add safe area padding for iOS devices */
        padding-top: env(safe-area-inset-top, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .body-no-scroll {
        overflow: hidden !important; /* Prevent body scroll when modals are open */
      }
      /* Custom Scrollbar Styles */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background-color: #e2e8f0; /* slate-200 */
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #94a3b8; /* slate-400 */
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #64748b; /* slate-500 */
      }
      /* For Firefox */
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #94a3b8 #e2e8f0; /* thumb track - slate-400 slate-200 */
      }

      /* Custom Prose Styles for Blog Content */
      .prose-custom h1, .prose-custom h2, .prose-custom h3, .prose-custom h4, .prose-custom h5, .prose-custom h6 {
        color: #1e293b; /* slate-800 */
        margin-top: 1.5em;
        margin-bottom: 0.75em;
        line-height: 1.3;
      }
      .prose-custom h1 { font-size: 2.25em; font-weight: bold; }
      .prose-custom h2 { font-size: 1.8em; font-weight: 600; border-bottom: 1px solid #cbd5e1; padding-bottom: 0.2em;} /* slate-300 */
      .prose-custom h3 { font-size: 1.5em; font-weight: 600;}
      .prose-custom h4 { font-size: 1.25em; font-weight: 600;}
      .prose-custom p {
        color: #334155; /* slate-700 */
        line-height: 1.7;
        margin-bottom: 1.25em;
      }
      .prose-custom a {
        color: #0d9488; /* teal-600 */
        text-decoration: underline;
        font-weight: 500;
      }
      .prose-custom a:hover {
        color: #0f766e; /* teal-700 */
      }
      .prose-custom ul, .prose-custom ol {
        color: #334155; /* slate-700 */
        margin-left: 1.5em;
        margin-bottom: 1.25em;
        padding-left: 0.5em;
      }
      .prose-custom li {
        margin-bottom: 0.5em;
      }
      .prose-custom ul li::marker {
        color: #14b8a6; /* teal-500 */
      }
       .prose-custom ol li::marker {
        color: #14b8a6; /* teal-500 */
        font-weight: bold;
      }
      .prose-custom blockquote {
        border-left-width: 4px;
        border-left-color: #14b8a6; /* teal-500 */
        padding-left: 1em;
        font-style: italic;
        color: #115e59; /* teal-800 */
        background-color: #f0fdfa; /* teal-50 */
        margin-top: 1.5em;
        margin-bottom: 1.5em;
        padding-top: 0.5em;
        padding-bottom: 0.5em;
        padding-right: 1em;
        border-radius: 0.25rem;
      }
      .prose-custom blockquote p {
        margin-bottom: 0;
      }
      .prose-custom pre {
        background-color: #1e293b; /* slate-800 */
        color: #e2e8f0; /* slate-200 */
        padding: 1em;
        border-radius: 0.375rem;
        overflow-x: auto;
        margin-bottom: 1.5em;
      }
      .prose-custom code {
        background-color: #ccfbf1; /* teal-100 */
        color: #0f766e; /* teal-700 */
        padding: 0.2em 0.4em;
        border-radius: 0.25rem;
        font-size: 0.9em;
      }
      .prose-custom pre code {
        background-color: transparent;
        color: inherit;
        padding: 0;
        border-radius: 0;
        font-size: inherit;
      }
      .prose-custom strong {
        color: #134e4a; /* teal-900 */
        font-weight: 600;
      }
      .prose-custom hr {
        border-top-color: #99f6e4; /* teal-200 */
        margin-top: 2em;
        margin-bottom: 2em;
      }

      /* Custom styles for the new TikTok icon */
      .tiktok-icon .tiktok-glitch-cyan,
      .tiktok-icon .tiktok-glitch-magenta {
        transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .tiktok-link:hover .tiktok-glitch-cyan {
        transform: translate(2px, -1.5px);
      }
      .tiktok-link:hover .tiktok-glitch-magenta {
        transform: translate(-2px, 1.5px);
      }


      /* Print-specific styles moved here to centralize custom CSS */
      @media print {
        body {
          padding-top: 0px !important; /* Reset safe area padding for print */
          padding-left: 0px !important;
          padding-right: 0px !important;
          padding-bottom: 0px !important;
        }
        body * {
          visibility: hidden;
        }
        .printable-area-wrapper, .printable-area-wrapper * {
          visibility: visible;
        }
        .printable-area-wrapper {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          padding: 0 !important; /* Remove padding for wrapper */
          margin: 0 !important; /* Remove margin for wrapper */
        }
        .printable-area .no-print {
          display: none !important;
        }
        .section-card { /* This class is used by AccordionItem */
           box-shadow: none !important;
           border: 1px solid #e2e8f0 !important; /* light gray border */
           margin-bottom: 1rem !important;
           page-break-inside: avoid !important;
           border-radius: 0.5rem !important; /* Match original rounded-lg */
        }
        .accordion-header { /* Target accordion headers specifically */
           background-color: #f8fafc !important; /* slate-50 for print consistency */
           -webkit-print-color-adjust: exact !important; /* Chrome, Safari */
           color-adjust: exact !important; /* Firefox, Edge */
           padding-top: 1rem !important;
           padding-bottom: 1rem !important;
        }
        .recommendation-card { /* Main card holding recommendations */
          padding: 1rem !important; /* Add some padding to the content itself */
          box-shadow: none !important;
          background: none !important;
          border: none !important; /* Remove border if it's just a container */
        }
        .recommendation-header { /* Specific title for the recommendation */
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }
         a {
            color: #0f766e !important; /* teal-700 */
            text-decoration: none !important;
         }
         a[href]:after { content: none !important; } /* Prevent URL display for cleaner print */

         /* Ensure markdown content within accordion items is styled for print */
        .accordion-content p, .accordion-content li, .accordion-content h4, .accordion-content h5 {
            color: #334155 !important; /* slate-700 */
         }
        .accordion-content blockquote {
            border-left-color: #14b8a6 !important; /* teal-500 */
            background-color: #f0fdfa !important; /* teal-50 */
            color: #115e59 !important; /* teal-800 */
         }
         
         /* Print styles for blog posts */
        .blog-post-printable .blog-title {
            color: #1e293b !important; /* slate-800 */
            font-size: 24pt !important;
        }
        .blog-post-printable .blog-meta {
            color: #475569 !important; /* slate-600 */
            font-size: 10pt !important;
        }
        .blog-post-printable .prose-custom p,
        .blog-post-printable .prose-custom li,
        .blog-post-printable .prose-custom blockquote {
            font-size: 12pt !important;
            color: #1e293b !important; /* slate-800 */
        }
         .blog-post-printable .prose-custom h2,
         .blog-post-printable .prose-custom h3,
         .blog-post-printable .prose-custom h4 {
            color: #0f172a !important; /* slate-900 */
            page-break-after: avoid !important;
         }
      }
